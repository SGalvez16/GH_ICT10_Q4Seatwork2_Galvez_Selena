<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyxscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    <title>My Classmates</title>
        <style>

        .container {
            max-width: 350px;
            height: 400px;
            margin: 70px auto;
            padding: 0 20px;
            box-shadow: 10px 10px 5px 0px rgba(0,0,0,0.75);
        }

        div{
            color: white;
            background-color: #b7b0b7;
            font-size: 15px;
            margin-bottom: 15px;
            padding: 5px;
            border-radius: 15px;
            text-align: center;
            margin: 10px;

        }

        body{
            background-color: white;
            text-align: left;
            margin: 0;
            padding: 0;
        }

        h5{
            color: grey;
        }

    </style>

</head>
<body>
  <div class="container">
    <div id="div">
    <h1>Grade 10 Classmates System</h1>
    <h5>Add and view your classmates easily</h5>
    <form>
        <input type="text" id="name" placeholder="Enter your name"><br>
        <input type="text" id="section" placeholder="Enter your section"><br>
        <input type="text" id="subject" placeholder="Enter your favorite subject"><br>
        <div id="output"></div>
        <input type="button" py-click="show_list" value="Show list">
        <input type="button" py-click="add_classmate" value="Add Classmate">
    </form>
    </div>
</div>
    </div>
    <py-script src="main.py"></py-script>
</body>
</html>
